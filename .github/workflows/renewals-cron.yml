name: renewals-cron

# Fires the auto renewal-reminder job every hour. The route
# (GET /api/renewals/cron) is idempotent + self-dedupes via the
# renewal_reminders_sent ledger, so overlapping runs are harmless.
#
# Hourly because accounts live in different time zones (migration 055):
# each run only processes accounts whose LOCAL time is past the send
# hour (09:00), and the ledger ensures each reminder goes out once per
# day — so every gym gets its reminders shortly after 9am local time.
#
# Native Vercel Cron can't send a custom header, and the route
# authenticates on `x-cron-secret` — so this GitHub Action is the pinger.
# Add the matching value as a repo secret named AUTOMATION_CRON_SECRET
# (Settings → Secrets and variables → Actions).

on:
  schedule:
    # :30 keeps the original 03:30 UTC = 09:00 IST slot for the home
    # market; half-hour zones (IST +5:30) land exactly on their 9am.
    - cron: "30 * * * *"
  # Lets you trigger a run by hand from the Actions tab (for testing).
  workflow_dispatch:

# If a run is somehow still going when the next fires, don't stack them.
concurrency:
  group: renewals-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger renewal reminders
        run: |
          curl --fail --silent --show-error \
            -H "x-cron-secret: ${{ secrets.AUTOMATION_CRON_SECRET }}" \
            https://desk.usefulmade.com/api/renewals/cron
